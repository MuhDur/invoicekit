[advisories]
# T-050: Typst 0.13.1 is the newest Typst family compatible with the workspace
# MSRV (Rust 1.83). Its public library stack currently pulls these
# unmaintained crates through syntect/hayagriva, and Typst exposes no feature
# set that removes them while still compiling and exporting PDFs.
#
# tools/release-checks/verify_release_checks.py fails CI if these advisories
# stop being present in deny.toml or if their crates appear outside the
# invoicekit-render-pdf Typst dependency chain.
ignore = [
  "RUSTSEC-2024-0320", # yaml-rust via syntect
  "RUSTSEC-2024-0436", # paste via hayagriva/biblatex
  "RUSTSEC-2025-0141", # bincode via syntect
]
