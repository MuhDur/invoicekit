[package]
name = "invoicekit-signer-zatca"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit ZATCA Phase 2 cryptographic stamp adapter layered on top of invoicekit-signer. Adds the Phase2Provider trait + ZatcaStampEnvelope (CSID + signature value + QR TLV) types + InvoiceHash helpers. Real ECDSA secp256k1 + ZATCA portal certificate flow ships behind a future `zatca-secp256k1` feature flag (T-083b1 follow-up)."
publish = false

[lib]
name = "invoicekit_signer_zatca"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
