[package]
name = "invoicekit-report-br-nfe"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Brazil NF-e (Nota Fiscal Eletronica) national-clearance report adapter: deterministic IR->infNFe XML serialization, CNPJ/CPF mod-11 validators, and an offline MockNfeReportProvider composing invoicekit-signer-nfe. Live SEFAZ transmission lands in a follow-up report-br-nfe-http crate."
publish = false

[lib]
name = "invoicekit_report_br_nfe"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-signer-nfe = { path = "../signer-nfe" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
