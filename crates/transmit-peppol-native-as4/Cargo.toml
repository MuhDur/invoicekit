[package]
name = "invoicekit-transmit-peppol-native-as4"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Native Rust AS4 sender GatewayAdapter (scaffold). XMLDSig signing + HTTP transport are injectable traits; xmlsec / reqwest impls land behind cargo features."
publish = false

[lib]
name = "invoicekit_transmit_peppol_native_as4"
path = "src/lib.rs"

[features]
# Compile-in the BYOK + Peppol Test Bed integration tests. Off by
# default so a fork without a Test Bed cert builds cleanly; flip
# on in CI when `PEPPOL_TEST_BED_CREDENTIALS` is set.
peppol-test-bed = []

[dependencies]
invoicekit-format-ubl = { path = "../format-ubl", version = "0.0.0" }
invoicekit-ir = { path = "../ir", version = "0.0.0" }
invoicekit-reconcile = { path = "../reconcile", version = "0.0.0" }
invoicekit-transmit-peppol-byok = { path = "../transmit-peppol-byok", version = "0.0.0" }
serde = { version = "1", features = ["derive"] }
thiserror.workspace = true

[dev-dependencies]
pollster = "0.4"

[lints]
workspace = true
