[package]
name = "invoicekit-report-tr-efatura"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Turkey e-Fatura / e-Arşiv (GİB clearance) adapter. Adds EFaturaProvider trait + GİB envelope + VKN/TCKN validation helpers. The live GİB SOAP integration lands in a follow-up report-tr-efatura-http crate."
publish = false

[lib]
name = "invoicekit_report_tr_efatura"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
