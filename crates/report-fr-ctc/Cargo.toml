[package]
name = "invoicekit-report-fr-ctc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "France CTC (Chorus Pro / PPF reform) e-invoicing + e-reporting report adapter: deterministic IR->Factur-X (EN 16931 CII) serialization, SIREN/SIRET/French-VAT validators, and an offline MockFrCtcReportProvider composing invoicekit-signer-france-ctc. France has no unique national XML; it rides EN 16931 via Factur-X. Live PPF/PDP transmission lands in a follow-up report-fr-ctc-http crate."
publish = false

[lib]
name = "invoicekit_report_fr_ctc"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-signer-eidas = { path = "../signer-eidas" }
invoicekit-signer-france-ctc = { path = "../signer-france-ctc" }
invoicekit-profile-factur-x = { path = "../profile-factur-x" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-signer-eidas = { path = "../signer-eidas" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
invoicekit-profile-factur-x = { path = "../profile-factur-x" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
