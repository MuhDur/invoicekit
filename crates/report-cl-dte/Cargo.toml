[package]
name = "invoicekit-report-cl-dte"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Chile SII DTE (Documento Tributario Electrónico) clearance adapter. Adds DteKind + Folio (CAF) consumer + SII signing envelope + RUT validation helpers. The live SII SOAP integration lands in a follow-up report-cl-dte-http crate."
publish = false

[lib]
name = "invoicekit_report_cl_dte"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }

[lints]
workspace = true
