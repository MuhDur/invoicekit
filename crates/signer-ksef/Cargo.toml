[package]
name = "invoicekit-signer-ksef"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit Poland KSeF (Krajowy System e-Faktur) certificate-flow adapter. Adds KsefProvider trait + session-token authentication + KSeF reference number stamp envelope. Real REST API integration lands behind a future `ksef-http` feature flag."
publish = false

[lib]
name = "invoicekit_signer_ksef"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
