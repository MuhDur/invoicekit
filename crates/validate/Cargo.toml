[package]
name = "invoicekit-validate"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit workspace member: invoicekit-validate — typed ValidationResult schema used by every validator backend."
publish = false

[lib]
name = "invoicekit_validate"
path = "src/lib.rs"

[dependencies]
schemars = { version = "0.9", features = ["preserve_order"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
proptest = "1"

[lints]
workspace = true
