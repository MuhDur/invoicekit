[package]
name = "invoicekit-signer-cfdi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit Mexico CFDI 4.0 PAC-signing adapter layered on top of invoicekit-signer. Adds the CfdiPacProvider trait + CfdiStampEnvelope (UUID + sello + cadena_original + PAC certificate number) types. Real RSA-SHA256 PAC integrations (Solucion Factible / Edicom / Facturando / etc.) ship behind a future `cfdi-rsa` feature flag."
publish = false

[lib]
name = "invoicekit_signer_cfdi"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.2.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
