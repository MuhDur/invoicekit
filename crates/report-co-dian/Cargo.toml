description = "Colombia DIAN e-invoicing clearance adapter. Adds DianDocumentKind + CUFE (Código Único de Facturación Electrónica) envelope + NIT validation helpers. The live DIAN SOAP integration lands in a follow-up report-co-dian-http crate."
