[package]
name = "invoicekit-signer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit signing substrate: Signer trait + SoftwareSigner. The signer-agent daemon (services/invoicekit-signer-agent) calls this crate over a local Unix socket so customer keys never leave the host."
publish = false

[lib]
name = "invoicekit_signer"
path = "src/lib.rs"

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
