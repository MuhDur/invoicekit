[package]
name = "invoicekit-signer-sdi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit Italy SDI (Sistema di Interscambio) signing adapter layered on top of invoicekit-signer. Adds SdiProvider trait + Aruba-qualified-certificate flow + FatturaPA stamp envelope types. Real XAdES-BES signing + SDI HTTP/PEC integration ships behind a future `sdi-http` feature flag."
publish = false

[lib]
name = "invoicekit_signer_sdi"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.0.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
