[package]
name = "invoicekit-report-ke-etims"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Kenya KRA eTIMS (electronic Tax Invoice Management System) adapter. Live KRA integration lands in a follow-up report-ke-etims-http crate."
publish = false

[lib]
name = "invoicekit_report_ke_etims"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
