[package]
name = "invoicekit-signer-france-ctc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "France CTC (Continuous Transaction Control) signing-and-routing adapter. Adds FrCtcProvider trait + EU qualified-certificate + PDP/PPF routing + DDADC (Données de Demande d'Approbation de Données Comptables) status envelope. Wire-compatible with the eIDAS adapter (T-083a) for the signing leg."
publish = false

[lib]
name = "invoicekit_signer_france_ctc"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.0.0" }
invoicekit-signer-eidas = { path = "../signer-eidas", version = "0.0.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
