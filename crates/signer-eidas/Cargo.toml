[package]
name = "invoicekit-signer-eidas"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit eIDAS qualified-signature adapter layered on top of invoicekit-signer. Adds the EidasQtspProvider trait + EidasSignatureProfile (AdES BES/T/LT/LTA for XAdES/CAdES/PAdES) + EidasSignature/EidasVerifyReport types. Real D-Trust / GlobalSign / Sectigo provider implementations land behind future feature flags (T-083a follow-up)."
publish = false

[lib]
name = "invoicekit_signer_eidas"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.1.0" }
invoicekit-timestamping = { path = "../timestamping", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
