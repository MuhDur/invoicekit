[package]
name = "invoicekit-mcp-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Model Context Protocol (MCP) server substrate. Exposes invoicekit verify / replay / show / pack as MCP tools so MCP-aware clients (Claude Code, Cursor, etc.) can drive the engine over JSON-RPC. The live stdio glue lands in a follow-up invoicekit-mcp-server-bin binary."
publish = false

[lib]
name = "invoicekit_mcp_server"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
