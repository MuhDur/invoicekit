[package]
name = "invoicekit-mcp-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Model Context Protocol (MCP) server substrate: tool definitions and a deterministic mock for invoicekit verify / replay / show / pack, plus the MCP wire types an MCP-aware client (Claude Code, Cursor, etc.) would use. Mock tool results are placeholder JSON; there is no engine wiring and no live stdio JSON-RPC server — that glue lands in a follow-up invoicekit-mcp-server-bin binary."
publish = false

[lib]
name = "invoicekit_mcp_server"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
