[package]
name = "invoicekit-signer-nfe"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit Brazil NF-e federal certificate flow adapter. Adds NfeProvider trait + ICP-Brasil-chained certificate types + per-state SEFAZ stamp envelope (chave de acesso + protocolo de autorização)."
publish = false

[lib]
name = "invoicekit_signer_nfe"
path = "src/lib.rs"

[dependencies]
invoicekit-signer = { path = "../signer", version = "0.2.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
