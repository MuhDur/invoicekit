[package]
name = "invoicekit-rulepack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit workspace member: invoicekit-rulepack — signed, versioned, effective-dated rule pack registry."
publish = false

[lib]
name = "invoicekit_rulepack"
path = "src/lib.rs"

[dependencies]
arc-swap = "1"
blake3 = "1"
notify = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
proptest = "1"
tempfile = "3"

[lints]
workspace = true
