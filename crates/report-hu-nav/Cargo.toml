[package]
name = "invoicekit-report-hu-nav"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Hungary NAV (Nemzeti Adó- és Vámhivatal) Online Számla reporting adapter. Adds NavProvider trait + transaction-id + token-exchange envelope + adóazonosító validation helpers. The live NAV REST integration lands in a follow-up report-hu-nav-http crate."
publish = false

[lib]
name = "invoicekit_report_hu_nav"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
