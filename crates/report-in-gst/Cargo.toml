[package]
name = "invoicekit-report-in-gst"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "India GST e-invoicing / IRP (Invoice Registration Portal) adapter. Adds IrpProvider trait + IRN/SignedQR/AckNo envelope + GSTIN + HSN/SAC validation helpers. The live IRP REST integration lands in a follow-up report-in-gst-http crate."
publish = false

[lib]
name = "invoicekit_report_in_gst"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
# preserve_order keeps serde_json::Map insertion-ordered so the INV-01
# serializer emits the schema's fixed key sequence deterministically (already
# enabled workspace-wide by sibling crates; no Cargo.lock change).
serde_json = { version = "1", features = ["preserve_order"] }
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
