[package]
name = "invoicekit-report-in-gst"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "India GST e-invoicing / IRP (Invoice Registration Portal) adapter. Adds IrpProvider trait + IRN/SignedQR/AckNo envelope + GSTIN + HSN/SAC validation helpers. The live IRP REST integration lands in a follow-up report-in-gst-http crate."
publish = false

[lib]
name = "invoicekit_report_in_gst"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
