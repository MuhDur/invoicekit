[package]
name = "invoicekit-report-it-sdi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Italy SDI (Sistema di Interscambio) national-clearance report adapter: deterministic IR->FatturaPA serialization, P.IVA/CF + ProgressivoInvio validators, and an offline MockSdiReportProvider composing invoicekit-signer-sdi. Live SDI transmission lands in a follow-up report-it-sdi-http crate."
publish = false

[lib]
name = "invoicekit_report_it_sdi"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-signer-sdi = { path = "../signer-sdi" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
