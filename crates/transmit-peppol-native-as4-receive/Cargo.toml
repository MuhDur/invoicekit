[package]
name = "invoicekit-transmit-peppol-native-as4-receive"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Native Rust AS4 receiver scaffold. mTLS listener + XMLDSig verifier + downstream dispatcher; all three abstractions are traits — xmlsec / axum impls land behind cargo features."
publish = false

[lib]
name = "invoicekit_transmit_peppol_native_as4_receive"
path = "src/lib.rs"

[features]
# Compile-in the BYOK + Peppol Test Bed integration tests. Off by
# default so a fork without a Test Bed cert builds cleanly; flip
# on in CI when `PEPPOL_TEST_BED_CREDENTIALS` is set.
peppol-test-bed = []

[dependencies]
invoicekit-transmit-peppol-native-as4 = { path = "../transmit-peppol-native-as4", version = "0.1.0" }
invoicekit-transmit-peppol-byok = { path = "../transmit-peppol-byok", version = "0.1.0" }
thiserror.workspace = true

[dev-dependencies]
pollster = "0.4"

[lints]
workspace = true
