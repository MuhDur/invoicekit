[package]
name = "invoicekit-tax-calculation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit workspace member: invoicekit-tax-calculation"
publish = false

[lib]
name = "invoicekit_tax_calculation"
path = "src/lib.rs"

[dependencies]
invoicekit-canonical = { path = "../canonical", version = "0.1.0" }
invoicekit-ir = { path = "../ir", version = "0.1.0" }
invoicekit-money = { path = "../money", version = "0.1.0" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
thiserror.workspace = true

[dev-dependencies]
proptest = "1"
serde_json = { version = "1", features = ["preserve_order"] }

[lints]
workspace = true
