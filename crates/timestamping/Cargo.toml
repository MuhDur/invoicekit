[package]
name = "invoicekit-timestamping"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit RFC 3161 timestamping substrate. TimestampClient trait + MockTimestampClient + RfcTimestamp wire-shape types. Real TSA HTTP client + ASN.1 token codec land behind a future reqwest feature flag."
publish = false

[lib]
name = "invoicekit_timestamping"
path = "src/lib.rs"

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
