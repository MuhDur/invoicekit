[package]
name = "invoicekit-intake-witness"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit intake witness — deterministic cross-examination of AI-extracted invoice fields. Re-validates line totals, VAT subtotals, and VAT IDs; blocks AI-only emission on rule mismatch."
publish = false

[lib]
name = "invoicekit_intake_witness"
path = "src/lib.rs"

[dependencies]
invoicekit-intake-citation = { path = "../intake-citation", version = "0.0.0" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
tracing.workspace = true

[lints]
workspace = true
