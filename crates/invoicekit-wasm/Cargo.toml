[package]
name = "invoicekit-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit WebAssembly artifact wrapping the engine JSON ABI. The country/format cargo features are advertising-only placeholders today (each is `= []` with no engine wiring); per-bundle code stripping lands in a follow-up."
publish = false

[lib]
name = "invoicekit_wasm"
path = "src/lib.rs"
# `cdylib` is what wasm-pack / wasm-bindgen expect to build a
# browser-loadable .wasm; `rlib` keeps the crate usable as a
# normal Rust dependency on native targets so the workspace-wide
# `cargo test --workspace` still includes it.
crate-type = ["cdylib", "rlib"]

[features]
# Default to "no country bundles advertised, no formats advertised."
# These flags are advertising-only (see below): the artifact is the
# same regardless, so this just keeps the runtime capability list empty
# for the leanest consumer.
default = []

# Country bundles. These are currently advertising-only placeholders:
# each is an empty list (`= []`) and nothing is wired through to the
# `invoicekit-engine` dependency, so enabling one only changes what
# `compiled_country_bundles()` reports at runtime — it does NOT toggle
# any `report-*` feature on the engine, and does not strip code. The
# engine feature wiring lands in a follow-up. Listed in alphabetical
# order to make the artifact-size test below trivially reproducible.
country-be = []
country-br = []
country-de = []
country-es = []
country-fr = []
country-gr = []
country-hu = []
country-in = []
country-it = []
country-mx = []
country-pl = []
country-ro = []
country-sa = []
country-tr = []

# Format bundles.
format-cii = []
format-factur-x = []
format-fatturapa = []
format-peppol = []
format-ubl = []
format-xrechnung = []

# Convenience meta-flag: enables every advertising flag (used by the
# artifact-size CI gate to assert the "full bundle" still fits the
# < 5 MB cap). Because the flags are no-ops today the artifact size is
# the same regardless; the gate is a forward guard for when the engine
# feature wiring lands.
full = [
  "country-be", "country-br", "country-de", "country-es",
  "country-fr", "country-gr", "country-hu", "country-in",
  "country-it", "country-mx", "country-pl", "country-ro",
  "country-sa", "country-tr",
  "format-cii", "format-factur-x", "format-fatturapa",
  "format-peppol", "format-ubl", "format-xrechnung",
]

[dependencies]
invoicekit-engine = { path = "../invoicekit-engine", version = "0.2.0" }
serde_json = "1"

# wasm-bindgen is the bridge to JavaScript; only compiled in on
# wasm32 targets so native builds (and the workspace-wide test
# matrix) don't pay the dep cost.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
