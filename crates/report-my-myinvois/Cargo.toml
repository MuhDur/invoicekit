[package]
name = "invoicekit-report-my-myinvois"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Malaysia MyInvois (LHDNM e-invoicing) adapter. Adds MyInvoisProvider trait + UUID/QR/CSID envelope + TIN + BRN validation helpers. The live LHDNM REST integration lands in a follow-up report-my-myinvois-http crate."
publish = false

[lib]
name = "invoicekit_report_my_myinvois"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-format-ubl = { path = "../format-ubl" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
