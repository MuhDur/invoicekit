[package]
name = "invoicekit-report-jp-qis"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Japan QIS (Qualified Invoice System / 適格請求書発行事業者登録番号) adapter. Adds QisIssuerRegistration + InvoiceKind + JCT category + Peppol-JP delivery envelope. JP went live with QIS in October 2023; B2B issuers stamp invoices with their registration number (Tnnnnnnnnnnnnn). The live NTA registry lookup + Peppol-JP delivery integration lands in a follow-up report-jp-qis-http crate."
publish = false

[lib]
name = "invoicekit_report_jp_qis"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
