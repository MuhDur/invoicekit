[package]
name = "invoicekit-report-pl-ksef"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Poland KSeF (Krajowy System e-Faktur) national-clearance report adapter: deterministic IR->FA(3) serialization, NIP (weighted-checksum) + KSeF reference validators, and an offline MockKsefReportProvider composing invoicekit-signer-ksef. Live KSeF transmission lands in a follow-up report-pl-ksef-http crate."
publish = false

[lib]
name = "invoicekit_report_pl_ksef"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-signer-ksef = { path = "../signer-ksef" }

[dev-dependencies]
invoicekit-ir = { path = "../ir" }
invoicekit-signer = { path = "../signer" }
invoicekit-canonical = { path = "../canonical" }
invoicekit-evidence = { path = "../evidence" }
invoicekit-verify = { path = "../verify" }
rust_decimal = { version = "1", default-features = false, features = ["serde-with-str", "std"] }
serde_json = "1"

[lints]
workspace = true
