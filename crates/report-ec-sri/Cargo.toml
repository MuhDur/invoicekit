[package]
name = "invoicekit-report-ec-sri"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Ecuador SRI e-invoicing clearance adapter. Adds SriDocumentKind + Clave de Acceso (49 digits) + autorización envelope + RUC validation helpers. The live SRI SOAP integration lands in a follow-up report-ec-sri-http crate."
publish = false

[lib]
name = "invoicekit_report_ec_sri"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
