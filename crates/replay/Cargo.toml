[package]
name = "invoicekit-replay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit replay-from-bundle: re-runs the recorded pipeline from a .invoicekit bundle and reports byte-equality or a structured diff against the originally-recorded outputs. Audit / debug feature."
publish = false

[lib]
name = "invoicekit_replay"
path = "src/lib.rs"

[dependencies]
invoicekit-evidence = { path = "../evidence", version = "0.0.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
