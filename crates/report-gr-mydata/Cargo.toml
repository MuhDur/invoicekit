[package]
name = "invoicekit-report-gr-mydata"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Greece myDATA (Άυλο Διασύνδεσμο) e-books / e-invoicing reporting adapter. Adds MyDataInvoiceCategory + MyDataMark + MyDataProvider trait + MyDataMark/UID/QR helpers. The Greek IAPR (Independent Authority for Public Revenue) endpoints are stubbed via MockMyDataProvider; the real REST / GovHub backend lands in a follow-up `report-gr-mydata-http` crate."
publish = false

[lib]
name = "invoicekit_report_gr_mydata"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
