[package]
name = "invoicekit-lsp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "InvoiceKit language server substrate. Provides LSP request/response types, diagnostic shape, and a parse harness (JSON syntax diagnostics; rule validation is a follow-up) IDE extensions wire to. The live tower-lsp glue lands in a follow-up invoicekit-lsp-server crate."
publish = false

[lib]
name = "invoicekit_lsp"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
