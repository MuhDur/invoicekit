[package]
name = "invoicekit-pdf-visual-regression"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "T-058 impl: rasterize a directory of PDFs, diff against committed baselines, emit a markdown report."
publish = false

[[bin]]
name = "pdf-visual-regression"
path = "src/main.rs"

[dependencies]
clap = { version = "4", default-features = false, features = ["std", "derive", "help", "usage", "error-context"] }
image = { version = "0.25", default-features = false, features = ["png"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror.workspace = true
# pdfium-render is gated behind the `pdfium` feature so the binary
# builds + the unit tests run on machines without the native
# pdfium shared library. The release workflow installs the shared
# library via apt + downloads the pdfium-binaries release archive,
# then runs `--features pdfium` to enable the rasterization path.
pdfium-render = { version = "0.9", optional = true, default-features = false, features = ["thread_safe", "image_025", "bindings", "pdfium_latest"] }

[features]
default = []
pdfium = ["dep:pdfium-render"]

[lints]
workspace = true
