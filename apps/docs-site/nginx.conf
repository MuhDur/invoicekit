server {
    listen       8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ~* \.(?:js|css|wasm|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
