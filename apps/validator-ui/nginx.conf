server {
    listen       8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback — every unknown path returns index.html so the
    # client-side router (currently a single page) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cache the immutable Vite assets aggressively but keep the
    # entry HTML uncached so a deploy lands instantly.
    location ~* \.(?:js|css|wasm|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
