# SPDX-License-Identifier: Apache-2.0
# T-1406 reference FastAPI demo: CI gate.
#
# Builds the invoicekit-ffi cdylib then runs the demo's pytest
# smoke suite against the bridge that loads it. Mirrors the
# pattern bindings/python/tests/test_engine_abi.py already uses
# in the main ci.yml.

name: demo-fastapi

on:
  push:
    paths:
      - "examples/fastapi/**"
      - "crates/invoicekit-ffi/**"
      - "crates/invoicekit-engine/**"
      - ".github/workflows/demo-fastapi.yml"
  pull_request:
    paths:
      - "examples/fastapi/**"
      - "crates/invoicekit-ffi/**"
      - "crates/invoicekit-engine/**"
      - ".github/workflows/demo-fastapi.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: demo smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build invoicekit-ffi cdylib
        run: cargo build -p invoicekit-ffi --locked

      - name: Install demo dependencies
        working-directory: examples/fastapi
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Smoke (6 pytest rows)
        working-directory: examples/fastapi
        env:
          INVOICEKIT_FFI_LIB: ${{ github.workspace }}/target/debug/libinvoicekit_ffi.so
        run: .venv/bin/pytest tests/test_smoke.py -v
