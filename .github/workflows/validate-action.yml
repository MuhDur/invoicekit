#
# T-115: validate-action manifest tests.
#
# Runs the schema-level action.yml tests on every push to main and
# every PR. Marketplace publishing runs out-of-band per
# docs/operators/VALIDATE-ACTION.md.

name: validate-action

on:
  push:
    branches: [main]
    paths:
      - "actions/validate-action/**"
      - ".github/workflows/validate-action.yml"
  pull_request:
    branches: [main]
    paths:
      - "actions/validate-action/**"
      - ".github/workflows/validate-action.yml"

jobs:
  action-yml-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run action.yml schema tests
        run: python3 -m unittest discover -s actions/validate-action/tests -v
