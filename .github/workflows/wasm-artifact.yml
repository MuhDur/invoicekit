name: WASM artifact

on:
  push:
    branches: [main]
    paths:
      - "crates/invoicekit-wasm/**"
      - "crates/invoicekit-engine/**"
      - ".github/workflows/wasm-artifact.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/invoicekit-wasm/**"
      - "crates/invoicekit-engine/**"
      - ".github/workflows/wasm-artifact.yml"

concurrency:
  group: wasm-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  build-and-size-check:
    name: cargo build + < 5 MB artifact-size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # T-025 acceptance gate #1: default-feature build succeeds for
      # the wasm32-unknown-unknown target. This is the leanest
      # artifact a customer can ship — engine ABI surface only.
      - name: cargo build (default features, wasm32)
        run: |
          cargo build \
            --release \
            --locked \
            -p invoicekit-wasm \
            --target wasm32-unknown-unknown

      # T-025 acceptance gate #1 (bead-specified slice): a typical
      # 4-country + Peppol bundle builds for wasm32.
      - name: cargo build (country-de,country-fr,country-it,format-peppol, wasm32)
        run: |
          cargo build \
            --release \
            --locked \
            -p invoicekit-wasm \
            --no-default-features \
            --features "country-de,country-fr,country-it,format-peppol" \
            --target wasm32-unknown-unknown

      # T-025 acceptance gate #1 (artifact-size assertion): the full
      # bundle (every country + every format) must still fit under
      # 5 MB so a customer who wants "everything" can still ship.
      # On a Cargo-cache miss this typically lands around 1-2 MB.
      - name: cargo build (full bundle, wasm32) + size gate
        run: |
          set -euo pipefail
          cargo build \
            --release \
            --locked \
            -p invoicekit-wasm \
            --no-default-features \
            --features full \
            --target wasm32-unknown-unknown
          ARTIFACT="target/wasm32-unknown-unknown/release/invoicekit_wasm.wasm"
          test -f "$ARTIFACT" || (echo "missing $ARTIFACT" && exit 1)
          SIZE=$(stat -c '%s' "$ARTIFACT")
          MAX=$((5 * 1024 * 1024))
          echo "full-bundle artifact size: $SIZE bytes (cap: $MAX bytes / 5 MB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "FAIL: artifact exceeds 5 MB cap"
            exit 1
          fi

      # T-025 acceptance gate #2 (smoke for wasm-bindgen surface):
      # cargo check the wasm-bindgen exports compile against the
      # wasm32 target. The full headless-Chrome wasm-pack test is
      # a follow-up (needs a browser runner in CI); cargo check is
      # the load-bearing precursor — if it fails, no browser test
      # would have worked anyway.
      - name: cargo check (wasm-bindgen exports)
        run: |
          cargo check \
            --release \
            --locked \
            -p invoicekit-wasm \
            --no-default-features \
            --features full \
            --target wasm32-unknown-unknown

      # Native-side test matrix — must pass on every feature
      # combination because the feature-flag bookkeeping has to
      # stay coherent across builds.
      - name: cargo test (default features, native)
        run: cargo test -p invoicekit-wasm --locked
      - name: cargo test (full features, native)
        run: cargo test -p invoicekit-wasm --features full --locked
      - name: cargo test (country-de,format-peppol, native)
        run: cargo test -p invoicekit-wasm --features "country-de,format-peppol" --locked
