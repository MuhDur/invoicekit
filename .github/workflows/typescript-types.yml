name: TypeScript types

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: typescript-types-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-and-check:
    name: '@invoicekit/types generate + tsc --noEmit'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript-types
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Re-generate from schemas/*.json and assert no drift
        run: bun run scripts/generate.mjs --check
      - name: TypeScript strict-mode compile
        run: bunx tsc --noEmit -p tsconfig.json
      - name: Round-trip + drift checks (bun's built-in test runner)
        run: bun test tests/round-trip.test.mjs
      - name: Verify package declares Apache 2.0 license
        run: |
          set -euo pipefail
          jq -e '.license == "Apache-2.0"' package.json
      - name: Build dist for install-matrix downstream job
        run: bunx tsc -p tsconfig.json
      - name: Pack tarball
        run: bun pm pack
      - name: Upload packed tarball
        uses: actions/upload-artifact@v4
        with:
          name: invoicekit-types-tarball
          path: bindings/typescript-types/*.tgz
          retention-days: 1
          if-no-files-found: error

  install-matrix:
    name: install + import (${{ matrix.toolchain }})
    needs: generate-and-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - npm
          - pnpm
          - bun
          - deno
          - node-yarn
    steps:
      - uses: actions/checkout@v4
      - name: Download packed tarball
        uses: actions/download-artifact@v4
        with:
          name: invoicekit-types-tarball
          path: tarball/
      - name: Pin tarball path
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          path=$(ls tarball/*.tgz | head -n 1)
          echo "path=$(realpath "$path")" >> "$GITHUB_OUTPUT"

      - if: matrix.toolchain == 'npm'
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - if: matrix.toolchain == 'npm'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-npm && cd smoke-npm
          npm init -y >/dev/null
          npm install "${{ steps.tarball.outputs.path }}"
          cp ../bindings/typescript-types/tests/install-smoke/smoke.mjs ./smoke.mjs
          node smoke.mjs

      - if: matrix.toolchain == 'pnpm'
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - if: matrix.toolchain == 'pnpm'
        uses: pnpm/action-setup@v4
        with: { version: 9 }
      - if: matrix.toolchain == 'pnpm'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-pnpm && cd smoke-pnpm
          pnpm init >/dev/null
          pnpm add "${{ steps.tarball.outputs.path }}"
          cp ../bindings/typescript-types/tests/install-smoke/smoke.mjs ./smoke.mjs
          node smoke.mjs

      - if: matrix.toolchain == 'node-yarn'
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - if: matrix.toolchain == 'node-yarn'
        shell: bash
        run: |
          set -euo pipefail
          # GitHub-hosted ubuntu-24.04 ships yarn 1.22.22 with the
          # node 20 setup; we use that pre-installed binary rather
          # than reinstalling globally (which trips EEXIST).
          yarn --version | grep -q "^1\." || npm install -g yarn@1.22.22 --force
          mkdir -p smoke-yarn && cd smoke-yarn
          yarn init -y >/dev/null
          yarn add file:"${{ steps.tarball.outputs.path }}"
          cp ../bindings/typescript-types/tests/install-smoke/smoke.mjs ./smoke.mjs
          node smoke.mjs

      - if: matrix.toolchain == 'bun'
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - if: matrix.toolchain == 'bun'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-bun && cd smoke-bun
          echo '{"name":"smoke-bun","version":"0.0.0","type":"module"}' > package.json
          bun add "${{ steps.tarball.outputs.path }}"
          cp ../bindings/typescript-types/tests/install-smoke/smoke.mjs ./smoke.mjs
          bun smoke.mjs

      - if: matrix.toolchain == 'deno'
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - if: matrix.toolchain == 'deno'
        uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - if: matrix.toolchain == 'deno'
        shell: bash
        run: |
          set -euo pipefail
          # Deno's `npm:` specifier resolves through the npm
          # registry, which fails for the not-yet-published
          # @invoicekit/types tarball. Use BYONM (Bring Your Own
          # Node Modules) so Deno reads the local node_modules
          # tree that `npm install` produced from the tarball.
          mkdir -p smoke-deno && cd smoke-deno
          npm init -y >/dev/null
          npm install "${{ steps.tarball.outputs.path }}"
          # deno.json with BYONM enabled lets bare specifiers
          # like "@invoicekit/types" resolve from local
          # node_modules.
          cat > deno.json <<'JSON'
          { "nodeModulesDir": "manual", "unstable": ["byonm"] }
          JSON
          cp ../bindings/typescript-types/tests/install-smoke/smoke.mjs ./smoke.mjs
          deno run --allow-read --allow-env smoke.mjs
