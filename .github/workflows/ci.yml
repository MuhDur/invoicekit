name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked
      - run: cargo test --workspace --locked

  outbox-db-migrations:
    name: outbox DB migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: invoicekit
          POSTGRES_DB: invoicekit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d invoicekit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: invoicekit
          MYSQL_DATABASE: invoicekit_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pinvoicekit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      INVOICEKIT_POSTGRES_URL: postgresql://postgres:invoicekit@127.0.0.1:5432/invoicekit_test
      INVOICEKIT_MYSQL_URL: mysql://root:invoicekit@127.0.0.1:3306/invoicekit_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p invoicekit-reconcile --test outbox_migrations --locked

  abi-golden:
    name: engine ABI golden suite
    runs-on: ubuntu-latest
    env:
      INVOICEKIT_FFI_LIB: ${{ github.workspace }}/target/debug/libinvoicekit_ffi.so
      LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
      CGO_ENABLED: 1
      CGO_LDFLAGS: -L${{ github.workspace }}/target/debug -linvoicekit_ffi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p invoicekit-ffi --locked
      - run: >
          cargo test --locked
          -p invoicekit-engine
          -p invoicekit-ffi
          -p invoicekit-wasm
          -p invoicekit-binding-node-napi
          -p invoicekit-binding-python
          -p invoicekit-binding-wasm-browser
          -p invoicekit-binding-rest-shim
      - run: python3 bindings/python/tests/test_engine_abi.py
      - run: bun test bindings/node-napi/tests/engine_abi_golden.test.ts
      - run: go test .
        working-directory: bindings/go
      - run: mkdir -p "$RUNNER_TEMP/invoicekit-java-abi-test"
      - run: >
          javac --add-modules jdk.incubator.foreign
          -d "$RUNNER_TEMP/invoicekit-java-abi-test"
          bindings/java/src/test/java/dev/invoicekit/AbiGoldenTest.java
      - run: >
          java --add-modules jdk.incubator.foreign
          --enable-native-access=ALL-UNNAMED
          -cp "$RUNNER_TEMP/invoicekit-java-abi-test"
          AbiGoldenTest
      - run: dotnet run --project bindings/dotnet/InvoiceKit.AbiGolden/InvoiceKit.AbiGolden.csproj

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories
