name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --locked
      - run: cargo test --workspace --locked

  cassette-pii-scan:
    name: cassette PII scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p invoicekit-transmit-mock cassette_corpus_has_no_unscrubbed_pii --locked

  outbox-db-migrations:
    name: outbox DB migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: invoicekit
          POSTGRES_DB: invoicekit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d invoicekit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: invoicekit
          MYSQL_DATABASE: invoicekit_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pinvoicekit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      INVOICEKIT_POSTGRES_URL: postgresql://postgres:invoicekit@127.0.0.1:5432/invoicekit_test
      INVOICEKIT_MYSQL_URL: mysql://root:invoicekit@127.0.0.1:3306/invoicekit_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p invoicekit-reconcile --test outbox_migrations --locked

  validator-sidecars:
    name: validator sidecar images
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f services/validator-kosit/Dockerfile -t invoicekit/validator-kosit:ci .
      - run: docker build -f services/validator-phive/Dockerfile -t invoicekit/validator-phive:ci .
      - run: docker build -f services/validator-saxon/Dockerfile -t invoicekit/validator-saxon:ci .
      - run: python3 services/validator-smoke.py

  validator-jvm-tests:
    name: validator JVM unit tests (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [phive, kosit, saxon]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # 7psv: mvn test under each profile exercises the
      # PhiveReport / KositReport reflection wrappers. The phive
      # profile is the one that proves a known-bad Peppol invoice
      # emits at least one BR-* finding from the EN 16931 oracle.
      - run: mvn -B -ntp -P${{ matrix.profile }} test
        working-directory: services/validator-common

  abi-golden:
    name: engine ABI golden suite
    runs-on: ubuntu-latest
    env:
      INVOICEKIT_FFI_LIB: ${{ github.workspace }}/target/debug/libinvoicekit_ffi.so
      LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
      CGO_ENABLED: 1
      CGO_LDFLAGS: -L${{ github.workspace }}/target/debug -linvoicekit_ffi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p invoicekit-ffi --locked
      - name: C ABI smoke compile
        run: |
          cc -std=c11 -Wall -Wextra -Werror \
            -I crates/invoicekit-ffi/include \
            crates/invoicekit-ffi/tests/c_smoke.c \
            -L target/debug -linvoicekit_ffi \
            -Wl,-rpath,${{ github.workspace }}/target/debug \
            -o target/debug/invoicekit-ffi-c-smoke
      - name: C ABI smoke run
        run: target/debug/invoicekit-ffi-c-smoke
      - run: >
          cargo test --locked
          -p invoicekit-engine
          -p invoicekit-ffi
          -p invoicekit-wasm
          -p invoicekit-binding-node-napi
          -p invoicekit-binding-python
          -p invoicekit-binding-wasm-browser
          -p invoicekit-binding-rest-shim
      - run: python3 bindings/python/tests/test_engine_abi.py
      - run: bun test bindings/node-napi/tests/engine_abi_golden.test.ts
      - run: go test .
        working-directory: bindings/go
      - run: mvn -B -ntp test
        working-directory: bindings/java
      - run: dotnet test bindings/dotnet/tests/InvoiceKit.Tests/InvoiceKit.Tests.csproj -c Release
      - run: dotnet run --project bindings/dotnet/InvoiceKit.AbiGolden/InvoiceKit.AbiGolden.csproj

  typescript-templates:
    name: TypeScript template language
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
        working-directory: templates/typescript
      - run: bun run verify
        working-directory: templates/typescript
      - run: bun audit
        working-directory: templates/typescript

  ffi-miri:
    name: ffi miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri test -p invoicekit-ffi --locked

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories

  # T-055: byte-stable PDF rendering across platforms.
  # Each runner renders the T-050 hello-world invoice (release
  # build for determinism) and uploads the bytes as an artifact;
  # the `render-byte-stable-compare` job downloads both artifacts
  # and asserts they are byte-equal. The Typst font loader is
  # already locked down to embedded fonts only, but a future
  # accidental flip of `include_system_fonts(true)` would trip
  # this gate because system fonts differ between Linux and
  # macOS.
  render-byte-stable-build:
    name: byte-stable render (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-latest
            label: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the byte-stable render artifact
        run: |
          mkdir -p target/byte-stable
          cargo run --release --quiet -p invoicekit-render-pdf \
            --example render_hello_world > target/byte-stable/hello.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: render-byte-stable-${{ matrix.label }}
          path: target/byte-stable/hello.pdf
          if-no-files-found: error
          retention-days: 14

  render-byte-stable-compare:
    name: byte-stable render — Linux vs macOS comparison
    needs: render-byte-stable-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: render-byte-stable-*
          path: artefacts/
      - name: Assert Linux and macOS PDFs are byte-equal
        run: |
          set -euo pipefail
          linux="artefacts/render-byte-stable-linux-x86_64/hello.pdf"
          macos="artefacts/render-byte-stable-macos-aarch64/hello.pdf"
          if [ ! -f "$linux" ]; then
            echo "missing Linux artifact at $linux" >&2
            ls -R artefacts/ >&2
            exit 1
          fi
          if [ ! -f "$macos" ]; then
            echo "missing macOS artifact at $macos" >&2
            ls -R artefacts/ >&2
            exit 1
          fi
          linux_sha=$(sha256sum "$linux" | cut -d' ' -f1)
          macos_sha=$(sha256sum "$macos" | cut -d' ' -f1)
          echo "linux sha256:  $linux_sha"
          echo "macos sha256:  $macos_sha"
          if [ "$linux_sha" != "$macos_sha" ]; then
            echo "byte drift between platforms — see the T-055 runbook." >&2
            cmp "$linux" "$macos" || true
            exit 1
          fi

  # 9cty: workspace coverage measurement gate. Reports per-crate
  # line coverage on every PR and fails when a foundation crate
  # drops below its floor (see scripts/coverage-thresholds.json).
  # plans/COVERAGE.md documents the ramp toward the universal 90%
  # target. Coverage runs only on Ubuntu — cargo-llvm-cov on macOS
  # is flaky on shared runners.
  coverage:
    name: workspace coverage gate
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run workspace coverage
        run: |
          cargo llvm-cov --workspace --locked \
            --ignore-filename-regex '(^|/)(bindings|services|examples)/' \
            --lcov --output-path coverage.lcov
          cargo llvm-cov report \
            --ignore-filename-regex '(^|/)(bindings|services|examples)/' \
            --json --output-path coverage-summary.json
      - name: Enforce coverage floors
        id: floors
        run: |
          {
            echo "## Workspace coverage"
            echo
            scripts/check-coverage.sh coverage-summary.json scripts/coverage-thresholds.json
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: error
          retention-days: 14
      - name: Upload JSON summary artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.json
          if-no-files-found: error
          retention-days: 14
