name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  openapi-spec:
    name: REST OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate OpenAPI spec + SHA-256
        run: |
          mkdir -p target/openapi
          SPEC=target/openapi/invoicekit-rest.openapi.json
          cargo run --locked -p invoicekit-binding-rest-shim --example export_openapi -- "$SPEC" > "${SPEC}.sha256"
          printf '%s  %s\n' "$(cat "${SPEC}.sha256")" "$SPEC" | sha256sum --check
      - name: Validate OpenAPI 3.1 document
        run: |
          python3 -m pip install --disable-pip-version-check --user openapi-spec-validator==0.7.2
          python3 -m openapi_spec_validator target/openapi/invoicekit-rest.openapi.json
      - name: Attach OpenAPI spec to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/openapi/invoicekit-rest.openapi.json
            target/openapi/invoicekit-rest.openapi.json.sha256

  # T-053: veraPDF PDF/A-3 gate. Hard release-time gate that
  # blocks the per-target release jobs (via `needs:`) so a
  # tagged release cannot publish without veraPDF clearing
  # every Factur-X candidate against `--profile=3b` AND
  # `--profile=3u`. The same gate runs on PR / push via
  # pdfa3-verapdf.yml; here it acts as the last-line check
  # before artefacts ship.
  verapdf-release-gate:
    name: veraPDF release gate (3b + 3u)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERAPDF_VERSION: "1.30.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: verapdf-release-gate
      - name: Install veraPDF ${{ env.VERAPDF_VERSION }} headless
        run: |
          set -euo pipefail
          URL="https://software.verapdf.org/releases/1.30/verapdf-greenfield-${VERAPDF_VERSION}-installer.zip"
          curl -fsSL "$URL" -o /tmp/verapdf.zip
          mkdir -p /tmp/verapdf-installer
          (cd /tmp/verapdf-installer && unzip -q /tmp/verapdf.zip)
          installer=$(find /tmp/verapdf-installer -maxdepth 3 -name 'verapdf-izpack-installer-*.jar' | head -1)
          if [ -z "$installer" ]; then
            echo "::error::veraPDF installer JAR not found under /tmp/verapdf-installer"
            ls -lR /tmp/verapdf-installer >&2
            exit 1
          fi
          INSTALL_DIR=/tmp/verapdf
          printf '1\n%s\nO\n1\nN\nY\nN\nN\n1\nN\n' "$INSTALL_DIR" \
            | java -jar "$installer" -console
          "$INSTALL_DIR/verapdf" --version
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
      - name: Render Factur-X release candidates
        run: |
          set -euo pipefail
          mkdir -p target/factur-x-acceptance
          cargo run --release --locked --quiet \
            -p invoicekit-render-factur-x-acceptance \
            -- --out target/factur-x-acceptance
          test -n "$(find target/factur-x-acceptance -name '*.pdf' -print -quit)"
      - name: veraPDF --profile=3b
        run: |
          set -euo pipefail
          mkdir -p target/verapdf-3b
          fail=0
          while IFS= read -r pdf; do
            report="target/verapdf-3b/$(basename "${pdf%.pdf}").xml"
            if ! verapdf --flavour 3b --format xml "$pdf" > "$report"; then
              echo "::error::veraPDF 3b reported a failure for $pdf"
              cat "$report"
              fail=1
            fi
            if grep -q 'isCompliant="false"' "$report"; then
              echo "::error::veraPDF 3b: $pdf is non-conformant"
              cat "$report"
              fail=1
            fi
          done < <(find target/factur-x-acceptance -name '*.pdf' | sort)
          exit "$fail"
      - name: veraPDF --profile=3u
        run: |
          set -euo pipefail
          mkdir -p target/verapdf-3u
          fail=0
          while IFS= read -r pdf; do
            report="target/verapdf-3u/$(basename "${pdf%.pdf}").xml"
            if ! verapdf --flavour 3u --format xml "$pdf" > "$report"; then
              echo "::error::veraPDF 3u reported a failure for $pdf"
              cat "$report"
              fail=1
            fi
            if grep -q 'isCompliant="false"' "$report"; then
              echo "::error::veraPDF 3u: $pdf is non-conformant"
              cat "$report"
              fail=1
            fi
          done < <(find target/factur-x-acceptance -name '*.pdf' | sort)
          exit "$fail"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verapdf-release-reports
          path: |
            target/factur-x-acceptance/
            target/verapdf-3b/
            target/verapdf-3u/
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Tagged release (${{ matrix.target }})
    needs: verapdf-release-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # T-133: dependency-scan gate. Any known-vulnerable or banned
      # crate fails the release BEFORE we burn a build slot. Both
      # tools also run on every PR via ci.yml; checking again here
      # closes the "advisory landed AFTER the PR merged but BEFORE
      # the tag was cut" window.
      - name: Install cargo-audit + cargo-deny
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny
      - name: cargo audit (RUSTSEC advisory DB)
        run: cargo audit --deny warnings
      - name: cargo deny (license + bans + sources + advisories)
        run: cargo deny check
      - name: Install cargo-cyclonedx (CycloneDX SBOM generator)
        run: cargo install --locked cargo-cyclonedx
      - name: Install cosign (sigstore keyless signer)
        uses: sigstore/cosign-installer@v3
      # aarch64 Linux is cross-compiled from the x86_64 ubuntu runner, which
      # needs the GNU cross-linker. x86_64-linux and aarch64-darwin are native.
      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      # Build only the shippable `invoicekit` CLI — it has light, cross-friendly
      # deps. Cross-compiling the whole workspace (intake-ocr/vlm pull native
      # ONNX/Paddle stacks) is fragile and unnecessary for the release artifact.
      - name: Build release binary (invoicekit CLI)
        run: cargo build --release -p invoicekit-cli --locked --target ${{ matrix.target }}
      - name: Package binary + checksums (target-suffixed, no collisions)
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/invoicekit"
          test -f "$BIN"
          mkdir -p dist
          NAME="invoicekit-${{ matrix.target }}"
          cp "$BIN" "dist/${NAME}"
          tar -czf "dist/${NAME}.tar.gz" -C "target/${{ matrix.target }}/release" invoicekit
          ( cd dist && sha256sum "${NAME}" "${NAME}.tar.gz" > "${NAME}.sha256" )
      - name: Generate CycloneDX SBOM (best effort)
        continue-on-error: true
        run: |
          cargo cyclonedx --format json -p invoicekit-cli || true
          find . -name 'bom.json' -not -path './target/*' -print0 \
            | tar --null --files-from - -czf "dist/invoicekit-${{ matrix.target }}.sbom.tar.gz" || true
      - name: Sign artifacts with cosign (best effort, keyless OIDC)
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in "dist/invoicekit-${{ matrix.target }}" "dist/invoicekit-${{ matrix.target }}.tar.gz"; do
            [ -f "$f" ] && cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f" || true
          done
      - name: Generate provenance attestation (best effort)
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: dist/invoicekit-${{ matrix.target }}
      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/invoicekit-${{ matrix.target }}*
