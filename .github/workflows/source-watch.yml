name: Source watch

on:
  push:
    branches: [main]
    paths:
      - "tools/source-watch-bot/**"
      - "data/sources/**"
      - ".github/workflows/source-watch.yml"
  pull_request:
    branches: [main]
    paths:
      - "tools/source-watch-bot/**"
      - "data/sources/**"
      - ".github/workflows/source-watch.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: source-watch-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  source-watch-tests:
    name: source-watch tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run source-watch tests
        run: pytest tools/source-watch-bot/tests -q
      - name: Verify signed source registry
        run: python3 tools/source-watch-bot/source_watch.py verify --registry data/sources/official.toml

  source-watch-daily:
    name: daily source watch
    runs-on: ubuntu-latest
    needs: source-watch-tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore source-watch state
        uses: actions/cache/restore@v4
        with:
          path: .source-watch-state.json
          key: source-watch-${{ github.run_id }}
          restore-keys: |
            source-watch-
      - name: Run source-watch bot
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python3 tools/source-watch-bot/source_watch.py run
          --registry data/sources/official.toml
          --state .source-watch-state.json
          --issue-backend github
          --github-repo ${{ github.repository }}
      - name: Save source-watch state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .source-watch-state.json
          key: source-watch-${{ github.run_id }}
