name: License header

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: license-header-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spdx-header-gate:
    name: SPDX header gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install pytest + jsonschema
        run: pip install pytest jsonschema
      - name: Run header-tool tests
        run: pytest tools/license-header/tests -q
      - name: Run release-checks meta-tests
        run: pytest tools/release-checks/tests -q
      - name: Run IR JSON Schema gate (T-011)
        run: pytest tools/release-checks/test_ir_schema_match.py -q
      - name: Run capabilities matrix schema gate (T-006a)
        run: pytest tools/release-checks/test_capabilities_matrix.py -q
      - name: Run TypeScript types parity gate (T-012)
        run: pytest tools/release-checks/test_typescript_types_match.py -q
      - name: Run country feasibility manifest gate (T-770+)
        run: pytest tools/release-checks/test_country_manifests.py -q
      - name: Run CII D16B coverage gate (invoices-rsho)
        run: pytest tools/release-checks/test_cii_coverage.py -q
      - name: Run CII conformance corpus gate (invoices-h4b3)
        run: pytest tools/release-checks/test_cii_conformance_corpus.py -q
      - name: Run conformance corpus metadata tests
        run: pytest tools/conformance-corpus/tests -q
      - name: Check Apache 2.0 SPDX header on every Rust source
        run: python3 tools/license-header/check_headers.py --check
      - name: Validate conformance fixture metadata
        run: python3 tools/conformance-corpus/validate_fixture_metadata.py
      - name: Verify ci.yml + release.yml + license-header.yml still wired
        run: python3 tools/release-checks/verify_release_checks.py
