name: License header

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: license-header-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spdx-header-gate:
    name: SPDX header gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run header-tool tests
        run: pytest tools/license-header/tests -q
      - name: Run release-checks meta-tests
        run: pytest tools/release-checks/tests -q
      - name: Check Apache 2.0 SPDX header on every Rust source
        run: python3 tools/license-header/check_headers.py --check
      - name: Verify ci.yml + release.yml + license-header.yml still wired
        run: python3 tools/release-checks/verify_release_checks.py
