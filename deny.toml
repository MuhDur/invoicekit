[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
  # T-050: Typst 0.13.1 is the newest Typst family compatible with the
  # workspace MSRV (Rust 1.83). Its public library stack currently pulls these
  # unmaintained crates through syntect/hayagriva, and Typst exposes no feature
  # set that removes them while still compiling and exporting PDFs.
  "RUSTSEC-2024-0320", # yaml-rust via syntect
  "RUSTSEC-2024-0436", # paste via hayagriva/biblatex
  "RUSTSEC-2025-0141", # bincode via syntect
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
