[package]
name = "invoicekit-signer-agent"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Local on-host signer daemon. Listens on a Unix socket and serves the JSON-RPC contract documented at services/validator-rpc.md; engine calls go through it so customer keys never leave the host process."
publish = false

[[bin]]
name = "invoicekit-signer-agent"
path = "src/main.rs"

[dependencies]
invoicekit-signer = { path = "../../crates/signer", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true

[lints]
workspace = true
